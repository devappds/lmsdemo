<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — LearnFlow LMS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Extra login-page micro styles */
    .login-page { flex-direction: column; gap: 0; }

    .demo-pills {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center; margin-top: 20px;
    }
    .demo-pill {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 14px; font-size: 12px;
      color: var(--text-secondary); cursor: pointer;
      transition: all var(--transition);
    }
    .demo-pill:hover { border-color: var(--accent); color: var(--accent); }
    .demo-pill strong { color: var(--text-primary); display: block; font-size: 11px; }

    .features-row {
      display: flex; gap: 24px; justify-content: center;
      flex-wrap: wrap; margin-top: 40px;
      position: relative; z-index: 1;
    }
    .feature-pill {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-secondary);
    }
    .feature-pill span { font-size: 16px; }

    .input-group { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px; pointer-events: none;
    }
    .input-group .form-control { padding-left: 38px; }

    .password-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; font-size: 16px;
      color: var(--text-muted); transition: color var(--transition);
    }
    .password-toggle:hover { color: var(--text-primary); }

    .divider-or {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text-muted); font-size: 12px;
    }
    .divider-or::before, .divider-or::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .student-fields { display: none; }
    .admin-fields   { display: block; }

    .powered-by {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: var(--text-muted); z-index: 1;
      white-space: nowrap;
    }
    .powered-by a { color: var(--accent); }

    @media (max-width: 480px) {
      .login-card { padding: 28px 22px; }
    }
  </style>
</head>
<body>
  <!-- Background decoration -->
  <div class="login-bg-decor">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="login-page" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px;">

    <!-- Login Card -->
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">🎓</div>
        <div class="logo-text">Learn<span>Flow</span></div>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to continue your learning journey</p>

      <!-- Role Toggle -->
      <div class="role-toggle" id="role-toggle">
        <div class="role-btn active" data-role="student" onclick="switchRole('student')">🎒 Student</div>
        <div class="role-btn"       data-role="admin"   onclick="switchRole('admin')">🛡️ Admin</div>
      </div>

      <!-- Student Fields -->
      <div id="student-fields">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <div class="input-group">
            <span class="input-icon">👤</span>
            <input type="text" id="student-name" class="form-control"
                   placeholder="Enter your full name" autocomplete="name" />
          </div>
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="loginStudent()">
          Start Learning →
        </button>
      </div>

      <!-- Admin Fields -->
      <div id="admin-fields" style="display:none;">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-icon">📧</span>
            <input type="email" id="admin-email" class="form-control"
                   placeholder="admin@learnflow.io" autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-group" style="position:relative;">
            <span class="input-icon">🔑</span>
            <input type="password" id="admin-password" class="form-control"
                   placeholder="Enter password" autocomplete="current-password"
                   onkeydown="if(event.key==='Enter') loginAdmin()" />
            <span class="password-toggle" onclick="togglePw()" id="pw-toggle">👁️</span>
          </div>
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="loginAdmin()">
          Sign In to Dashboard →
        </button>

        <div class="demo-pills">
          <div class="demo-pill" onclick="fillAdminDemo()">
            <strong>Demo Credentials</strong>
            admin@learnflow.io / admin123
          </div>
        </div>
      </div>

      <div class="login-footer">
        <span id="footer-text">New to LearnFlow? </span>
        <span class="login-link" id="footer-link" onclick="switchRole('admin')">Admin login</span>
      </div>
    </div>

    <!-- Feature Pills -->
    <div class="features-row">
      <div class="feature-pill"><span>⚡</span> Instant Quizzes</div>
      <div class="feature-pill"><span>📊</span> Live Analytics</div>
      <div class="feature-pill"><span>🏆</span> Score Tracking</div>
      <div class="feature-pill"><span>🌙</span> Dark Mode</div>
    </div>
  </div>

  <!-- Theme toggle fixed -->
  <button class="theme-toggle" style="position:fixed;top:16px;right:16px;z-index:999;" title="Toggle theme"></button>

  <p class="powered-by">Built with ❤️ by <a href="#">LearnFlow</a> · All data stored locally</p>

  <script src="script.js"></script>
  <script>
    /* ── Role Switching ── */
    function switchRole(role) {
      document.querySelectorAll('.role-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.role === role);
      });
      document.getElementById('student-fields').style.display = role === 'student' ? 'block' : 'none';
      document.getElementById('admin-fields').style.display   = role === 'admin'   ? 'block' : 'none';

      const ftLink = document.getElementById('footer-link');
      const ftText = document.getElementById('footer-text');
      if (role === 'student') {
        ftText.textContent = 'Are you an admin? ';
        ftLink.textContent = 'Admin login';
        ftLink.onclick = () => switchRole('admin');
      } else {
        ftText.textContent = 'Not an admin? ';
        ftLink.textContent = 'Student access';
        ftLink.onclick = () => switchRole('student');
      }
    }

    /* ── Student Login ── */
    function loginStudent() {
      const name = document.getElementById('student-name').value.trim();
      if (!name) { showToast('Please enter your name', 'warn'); return; }
      DB.set(KEYS.USER, { name, role: 'student' });
      window.location.href = 'index.html';
    }

    /* ── Admin Login ── */
    function loginAdmin() {
      const email = document.getElementById('admin-email').value.trim();
      const pass  = document.getElementById('admin-password').value;
      // Demo credentials (in a real app use a backend)
      if (email === 'admin@learnflow.io' && pass === 'admin123') {
        DB.set(KEYS.USER, { name: 'Admin', role: 'admin', email });
        window.location.href = 'admin.html';
      } else {
        showToast('Invalid credentials. Try: admin@learnflow.io / admin123', 'error');
        document.getElementById('admin-password').value = '';
      }
    }

    /* ── Toggle password visibility ── */
    function togglePw() {
      const input  = document.getElementById('admin-password');
      const toggle = document.getElementById('pw-toggle');
      input.type   = input.type === 'password' ? 'text' : 'password';
      toggle.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    /* ── Fill demo credentials ── */
    function fillAdminDemo() {
      document.getElementById('admin-email').value    = 'admin@learnflow.io';
      document.getElementById('admin-password').value = 'admin123';
      showToast('Demo credentials filled!', 'info');
    }

    /* ── Check if already logged in ── */
    document.addEventListener('DOMContentLoaded', () => {
      const user = DB.get(KEYS.USER);
      if (user?.role === 'admin')   window.location.href = 'admin.html';
      if (user?.role === 'student') window.location.href = 'index.html';
    });
  </script>
</body>
</html>
